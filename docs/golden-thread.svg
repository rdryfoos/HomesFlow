<svg xmlns="http://www.w3.org/2000/svg" width="860" height="86" viewBox="0 0 860 86" role="img" aria-label="Golden thread pipeline: PRD to spec to tasks to code to tests to CI gate that fails the build if the thread breaks">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; text-anchor: middle; }
    .t { font-size: 13px; font-weight: 600; fill: #1f2328; }
    .s { font-size: 11.5px; fill: #57606a; }
    .gate-t { font-size: 13px; font-weight: 600; fill: #1a7f37; }
    .gate-s { font-size: 11.5px; fill: #1a7f37; }
    .box { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .arrow { stroke: #8c959f; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8c959f"/>
    </marker>
  </defs>

  <rect class="box" x="8" y="14" width="120" height="52" rx="8"/>
  <text class="t" x="68" y="36">PRD</text>
  <text class="s" x="68" y="53">immutable IDs</text>
  <line class="arrow" x1="128" y1="40" x2="148" y2="40" marker-end="url(#head)"/>

  <rect class="box" x="150" y="14" width="120" height="52" rx="8"/>
  <text class="t" x="210" y="36">spec.md</text>
  <text class="s" x="210" y="53">feature slice</text>
  <line class="arrow" x1="270" y1="40" x2="290" y2="40" marker-end="url(#head)"/>

  <rect class="box" x="292" y="14" width="120" height="52" rx="8"/>
  <text class="t" x="352" y="36">tasks.md</text>
  <text class="s" x="352" y="53">Traces: fields</text>
  <line class="arrow" x1="412" y1="40" x2="432" y2="40" marker-end="url(#head)"/>

  <rect class="box" x="434" y="14" width="120" height="52" rx="8"/>
  <text class="t" x="494" y="36">Swift code</text>
  <text class="s" x="494" y="53">@covers notes</text>
  <line class="arrow" x1="554" y1="40" x2="574" y2="40" marker-end="url(#head)"/>

  <rect class="box" x="576" y="14" width="120" height="52" rx="8"/>
  <text class="t" x="636" y="36">tests</text>
  <text class="s" x="636" y="53">test_AC_* names</text>
  <line class="arrow" x1="696" y1="40" x2="716" y2="40" marker-end="url(#head)"/>

  <rect x="718" y="14" width="134" height="52" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5"/>
  <text class="gate-t" x="785" y="36">Gate 2 (CI)</text>
  <text class="gate-s" x="785" y="53">breaks? build fails</text>
</svg>
