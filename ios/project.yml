name: HomesFlow
options:
  bundleIdPrefix: com.rdryfoos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.1
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  HomesFlow:
    type: application
    platform: iOS
    sources:
      - path: HomesFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homesflow
        INFOPLIST_FILE: HomesFlow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HomesFlow/Resources/HomesFlow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_TESTABILITY: YES
    configFiles:
      Debug: HomesFlow/Resources/Secrets.xcconfig
      Release: HomesFlow/Resources/Secrets.Release.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
  HomesFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomesFlowTests
    dependencies:
      - target: HomesFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homesflow.tests
        GENERATE_INFOPLIST_FILE: YES
  HomesFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomesFlowUITests
    dependencies:
      - target: HomesFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homesflow.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  HomesFlow:
    build:
      targets:
        HomesFlow: all
    test:
      targets:
        - HomesFlowTests
        - HomesFlowUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
