name: HomeFlow
options:
  bundleIdPrefix: com.homeflow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.1
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  HomeFlow:
    type: application
    platform: iOS
    sources:
      - path: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homeflow.app
        INFOPLIST_FILE: HomeFlow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HomeFlow/Resources/HomeFlow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_TESTABILITY: YES
    configFiles:
      Debug: HomeFlow/Resources/Secrets.xcconfig
      Release: HomeFlow/Resources/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
  HomeFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeFlowTests
    dependencies:
      - target: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homeflow.app.tests
        GENERATE_INFOPLIST_FILE: YES
  HomeFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomeFlowUITests
    dependencies:
      - target: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homeflow.app.uitests
        GENERATE_INFOPLIST_FILE: YES
