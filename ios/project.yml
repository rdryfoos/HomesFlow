name: HomeFlow
options:
  bundleIdPrefix: com.rdryfoos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.1
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  HomeFlow:
    type: application
    platform: iOS
    sources:
      - path: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homeflow
        INFOPLIST_FILE: HomeFlow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HomeFlow/Resources/HomeFlow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_TESTABILITY: YES
    configFiles:
      Debug: HomeFlow/Resources/Secrets.xcconfig
      Release: HomeFlow/Resources/Secrets.Release.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
  HomeFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeFlowTests
    dependencies:
      - target: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homeflow.tests
        GENERATE_INFOPLIST_FILE: YES
  HomeFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomeFlowUITests
    dependencies:
      - target: HomeFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rdryfoos.homeflow.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  HomeFlow:
    build:
      targets:
        HomeFlow: all
    test:
      targets:
        - HomeFlowTests
        - HomeFlowUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
