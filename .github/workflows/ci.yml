name: CI (Craft Gate 0)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck gate scripts
        run: shellcheck -S warning scripts/*.sh

  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gate 2 — golden thread
        run: bash scripts/check-traceability.sh

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Debug secrets for CI build
        run: |
          cp ios/HomesFlow/Resources/Secrets.xcconfig.example ios/HomesFlow/Resources/Secrets.xcconfig
          cp ios/HomesFlow/Resources/Secrets.Release.xcconfig.example ios/HomesFlow/Resources/Secrets.Release.xcconfig
      - name: Install tooling
        run: brew install xcodegen swiftlint
      - name: Generate Xcode project
        run: cd ios && xcodegen generate
      - name: SwiftLint
        run: cd ios && swiftlint lint --config .swiftlint.yml --strict
      - name: Build
        run: |
          cd ios
          SIM_ID=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -1 | grep -oE '[0-9A-F-]{36}')
          echo "Using simulator id=${SIM_ID}"
          xcodebuild build \
            -project HomesFlow.xcodeproj \
            -scheme HomesFlow \
            -destination "platform=iOS Simulator,id=${SIM_ID}" \
            CODE_SIGNING_ALLOWED=NO
      - name: Unit tests
        run: |
          cd ios
          SIM_ID=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -1 | grep -oE '[0-9A-F-]{36}')
          xcodebuild test \
            -project HomesFlow.xcodeproj \
            -scheme HomesFlow \
            -destination "platform=iOS Simulator,id=${SIM_ID}" \
            -only-testing:HomesFlowTests \
            CODE_SIGNING_ALLOWED=NO

  # T089 — CI-based Sonar so sonar-project.properties multicriteria apply.
  # Requires repo secret SONAR_TOKEN (SonarCloud → My Account → Security).
  # Quality gate decoration still posts as "SonarCloud Code Analysis" via the
  # SonarCloud GitHub App. After this job is green, disable Automatic Analysis
  # in SonarCloud to avoid double scans (see sonar-disposition.md).
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "::error::SONAR_TOKEN secret is not set. Add a SonarCloud analysis token at Settings → Secrets → Actions, then re-run."
            exit 1
          fi
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  craft-gate:
    runs-on: ubuntu-latest
    needs: [shellcheck, traceability, ios]
    if: always()
    steps:
      - name: Gate 0 — all craft checks passed
        run: |
          if [[ "${{ needs.shellcheck.result }}" != "success" ]] || \
             [[ "${{ needs.traceability.result }}" != "success" ]] || \
             [[ "${{ needs.ios.result }}" != "success" ]]; then
            echo "craft-gate: one or more jobs failed"
            exit 1
          fi
          echo "craft-gate: shellcheck, traceability, and ios all passed"
          echo "Note: SonarCloud is a separate required check (job 'sonar' + App decoration)."
